<!DOCTYPE html>
<html>
<head>
<title>AngularJS ng-bind-html with Custom Font</title>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular-sanitize.js"></script>
<style>
/* @import url('https://fonts.googleapis.com/css2?family=Gilroy:wght@400;700&display=swap');  Import Gilroy from Google Fonts */

body, h1, h2, p, span, a, i, b, u {
  font-family: 'SVN-Gilroy', sans-serif;
} 

/* Optional: Additional styling for specific elements if needed */
h1 {
  text-align: center;
}

h3 {
  text-align: justify;
  color: #2e75b5; /* Example color */
}
</style>
</head>
<body>

<div ng-app="myApp" ng-controller="myCtrl">
  <p ng-bind-html="myText"></p>
</div>

<script>
var app = angular.module("myApp", ['ngSanitize']);
app.controller("myCtrl", function($scope) {
    $scope.myText = "<h1 style=\"text-align: center;background-color: red;\"><b style=\"background-color: transparent; p-family: Calibri; p-size: 11pt;\"><span style=\"p-family: Arial; line-height: 18.24px; color: rgb(34, 34, 34); font-size: 12pt;\">BÁC SĨ VƯƠNG THỊ NGỌC LAN LÀM PHÓ HIỆU TRƯỞNG&nbsp;</span></b><b style=\"background-color: transparent;\"><span style=\"font-family: Arial; line-height: 18.24px; color: rgb(34, 34, 34); font-size: 12pt;\">TRƯỜNG ĐẠI HỌC Y DƯỢC TP.HCM</span></b></h1><h2 align=\"justify\" style=\"text-align: justify; margin-top: 0pt; margin-bottom: 18pt; break-after: avoid; line-height: 22.5pt; font-family: &quot;Calibri Light&quot;; color: rgb(46, 117, 181); font-size: 13pt; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Trường đại học Y Dược TP.HCM vừa công bố nghị quyết bổ nhiệm phó hiệu trưởng phụ trách chuyên môn của nhà trường.</span><span style=\"font-family: Arial; font-size: 12pt;\">&nbsp;</span></h2><p class=\"MsoNormal\" align=\"justify\" style=\"margin-bottom: 8pt; line-height: 15.6933px; font-family: Calibri; font-size: 11pt; color: rgb(0, 0, 0); text-align: justify;\"><span style=\"font-family: Arial; color: rgb(143, 143, 143); font-size: 12pt; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\">Thứ trưởng Bộ Y tế Nguyễn Tri Thức tặng hoa chúc mừng PGS.TS Vương Thị Ngọc Lan được bổ nhiệm phó hiệu trưởng phụ trách chuyên môn Trường đại học Y Dược TP.HCM - Ảnh: HUỲNH NHƯ</span><span style=\"font-family: Arial; color: rgb(143, 143, 143); font-size: 12pt; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><o:p></o:p></span></p><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Sáng nay 17-8, Trường đại học Y Dược TP.HCM đã tổ chức lễ công bố nghị quyết của hội đồng trường bổ nhiệm&nbsp;</span><a href=\"https://tuoitre.vn/pho-hieu-truong.html\" title=\"phó hiệu trưởng\"><u><span class=\"15\" style=\"font-family: Arial; color: rgb(34, 106, 197);\">phó hiệu trưởng</span></u></a><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">&nbsp;phụ trách chuyên môn của nhà trường nhiệm kỳ 2020-2025.</span><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></p><h2 align=\"justify\" style=\"margin-top: 6pt; margin-bottom: 6pt; break-after: avoid; line-height: 18.5467px; font-family: &quot;Calibri Light&quot;; color: rgb(46, 117, 181); font-size: 13pt; text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><b><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Tân phó hiệu trưởng phụ trách chuyên môn trưởng thành từ thực tiễn</span></b><b><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></b></h2><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Tại buổi lễ, GS.TS Trần Diệp Tuấn - bí thư Đảng ủy, chủ tịch hội đồng trường Trường đại học Y Dược TP.HCM - đã trao nghị quyết của hội đồng trường Trường đại học Y Dược TP.HCM bổ nhiệm tân phó hiệu trưởng phụ trách chuyên môn cho PGS.TS.BS Vương Thị Ngọc Lan - trưởng khoa y.</span><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></p><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Nghị quyết bổ nhiệm chức vụ phó hiệu trưởng phụ trách chuyên môn cho bà Vương Thị Ngọc Lan do chủ tịch hội đồng trường Trần Diệp Tuấn ký ngày 1-8.</span><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></p><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Theo nghị quyết này, thời gian giữ chức vụ phó hiệu trưởng chuyên môn của bà Lan theo nhiệm kỳ 2020-2025 của hội đồng trường Trường đại học Y Dược TP.HCM.</span><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></p><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Phát biểu tại buổi lễ, ông Nguyễn Tri Thức - thứ trưởng Bộ Y tế - cho rằng được nhận nhiệm vụ phó hiệu trưởng Trường đại học Y Dược TP.HCM là một vinh dự to lớn nhưng cũng đầy trách nhiệm với bà Vương Thị Ngọc Lan.&nbsp;</span><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></p><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Ông Thức chúc mừng bà Lan và chúc mừng nhà trường có thêm một lãnh đạo trưởng thành từ thực tiễn tham gia ban giám hiệu.</span><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></p><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">\"Tôi mong muốn bằng uy tín, kinh nghiệm và năng lực của mình, đồng chí Lan cùng với Đảng ủy, hội đồng trường, ban giám hiệu hoàn thành xuất sắc nhiệm vụ được giao, góp phần phát huy những giá trị truyền thống tốt đẹp, xây dựng Trường đại học Y Dược TP.HCM ngày càng phát triển, khẳng định vị thế của trường trong đào tạo, nghiên cứu khoa học…\", ông Thức nói.</span><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></p><h2 align=\"justify\" style=\"margin-top: 6pt; margin-bottom: 6pt; break-after: avoid; line-height: 18.5467px; font-family: &quot;Calibri Light&quot;; color: rgb(46, 117, 181); font-size: 13pt; text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><b><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">PGS.TS Vương Thị Ngọc Lan là nhà khoa học hàng đầu về hiếm muộn</span></b><b><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></b></h2><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Trước khi được bổ nhiệm chức vụ phó hiệu trưởng, PGS.TS Vương Thị Ngọc Lan đang kiêm nhiệm nhiều chức vụ quản lý của trường, như trưởng khoa y, trưởng bộ môn phụ sản - khoa y Trường đại học Y Dược TP.HCM.</span><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></p><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Bên cạnh đó, PGS.TS Vương Thị Ngọc Lan hiện là tổng biên tập&nbsp;</span><i><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Tạp chí Y học TP.HCM</span></i><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">, thành viên ban biên tập tạp chí&nbsp;</span><i><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Fertility and Reproduction</span></i><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">&nbsp;(tạp chí chính thức của ASPIRE), thành viên nhóm biên soạn của Tổ chức Y tế thế giới về hướng dẫn tiếp cận một cặp vợ chồng hiếm muộn.</span><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></p><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Bà còn tham gia bình duyệt bài báo khoa học cho các tạp chí&nbsp;</span><i><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Human Reproduction, Human Reproduction Update, Human Reproduction Open, Reproductive Biomedicine Online, Scientific Report (Nature), Reproductive Biology.</span></i><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></p><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">PGS.TS Vương Thị Ngọc Lan từng tham gia giảng dạy các khóa đào tạo về hỗ trợ sinh sản của Đại học Quốc gia Singapore.</span><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></p><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Bà Vương Thị Ngọc Lan tốt nghiệp bác sĩ đa khoa Trường đại học Y khoa Phạm Ngọc Thạch năm 1996, thạc sĩ phôi học lâm sàng Đại học Quốc gia Singapore năm 1999, bác sĩ nội trú sản Trường đại học Y Dược TP.HCM năm 2004 và tiến sĩ y học chuyên ngành sản phụ khoa Trường đại học Y Dược TP.HCM năm 2016.</span><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></p><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">TS&nbsp;</span><a href=\"https://tuoitre.vn/vuong-thi-ngoc-lan.html\" title=\"Vương Thị Ngọc Lan\"><u><span class=\"15\" style=\"font-family: Arial; color: rgb(34, 106, 197);\">Vương Thị Ngọc Lan</span></u></a><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">&nbsp;được bổ nhiệm chức danh phó giáo sư năm 2019.</span><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></p><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">PGS.TS Vương Thị Ngọc Lan chuyên nghiên cứu trong lĩnh vực y sinh, là một trong ba nhà khoa học nhận Giải thưởng Tạ Quang Bửu năm 2020 về so sánh phương pháp chuyển phôi tươi và đông lạnh để thụ tinh ống nghiệm (IVF).</span><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></p><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Bà có nhiều đóng góp cho nghiên cứu cũng như thực hiện IVF cho hàng ngàn gia đình.</span><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></p><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Bà từng lọt vào top 100 châu Á năm 2021 do tạp chí&nbsp;</span><i><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Asian Scientist</span></i><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">&nbsp;(Singapore) bình chọn.</span><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></p><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">PGS.TS Vương Thị Ngọc Lan là tác giả, đồng tác giả của trên 80 đề tài nghiên cứu và bài báo khoa học đăng trên tạp chí chuyên ngành trong nước và quốc tế (gồm&nbsp;</span><i><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">New England Journal of Medicine, Human Reproduction, Fertility &amp; Sterility, Reproductive BioMedicine Online, Journal of Assisted Reproduction and Genetics, BMJ, Frontiers in Endocrinology</span></i><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">…).</span><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></p><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Bà còn là đồng chủ biên và tham gia biên soạn nhiều sách chuyên khảo về nội tiết sinh sản và kỹ thuật hỗ trợ sinh sản và sách giáo trình về sản phụ khoa.</span><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></p><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\">Bác sĩ Lan từng là phó trưởng khoa hiếm muộn Bệnh viện Từ Dũ (TP.HCM). Bà là con gái của GS.BS Nguyễn Thị Ngọc Phượng, nguyên giám đốc Bệnh viện Từ Dũ.</span><span style=\"font-family: Arial; color: rgb(34, 34, 34); font-size: 12pt;\"><o:p></o:p></span></p><p class=\"p\" align=\"justify\" style=\"margin-top: 12pt; margin-bottom: 12pt; font-family: &quot;Times New Roman&quot;; font-size: 12pt; color: rgb(0, 0, 0); text-align: justify; background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;\"><i><span style=\"font-family: Arial; color: rgb(51, 51, 51); font-size: 12pt; background: rgb(255, 251, 242);\">Ban giám hiệu Trường đại học Y Dược TP.HCM hiện vẫn chưa có hiệu trưởng, tất cả đều là phó hiệu trưởng, gồm: PGS.TS Ngô Quốc Đạt - phó hiệu trưởng phụ trách, PGS.TS Nguyễn Văn Chinh - phó hiệu trưởng và PGS.TS Vương Thị Ngọc Lan - phó hiệu trưởng phụ trách chuyên môn.</span></i><i><span style=\"font-family: A
